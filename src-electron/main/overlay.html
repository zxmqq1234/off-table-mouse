<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>overlay</title>
  <style>
    /* overlay 动效层：透明背景，覆盖全屏，不拦截鼠标（窗口层已 setIgnoreMouseEvents） */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    /* ===== 单指触碰涟漪 ===== */
    @keyframes ripple-out {
      0% {
        transform: translate(-50%, -50%) scale(0.3);
        opacity: 0.9;
        border-width: 4px;
      }
      100% {
        transform: translate(-50%, -50%) scale(3.5);
        opacity: 0;
        border-width: 1px;
      }
    }
    .fx-ripple {
      position: absolute;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 4px solid #3b82f6;
      box-shadow: 0 0 16px rgba(59, 130, 246, 0.5);
      animation: ripple-out 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    /* 涟漪中心点（脉冲圆点） */
    @keyframes dot-pulse {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }
    .fx-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3b82f6;
      animation: dot-pulse 0.6s ease-out forwards;
    }

    /* ===== 手势气泡（文字+光环） ===== */
    @keyframes gesture-pop {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
      75% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0; }
    }
    @keyframes ring-expand {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
    }
    .fx-bubble {
      position: absolute;
      padding: 10px 20px;
      background: rgba(59, 130, 246, 0.92);
      color: #fff;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
      animation: gesture-pop 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    /* 手势光环（气泡背后的扩散圈） */
    .fx-ring {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid rgba(59, 130, 246, 0.6);
      animation: ring-expand 1.4s ease-out forwards;
    }
  </style>
</head>

<body>
  <!-- 动效元素动态插入 body，动画结束自动移除 -->
  <script>
    /**
     * overlay 动效渲染脚本
     * 通过 preload 暴露的 window.__overlayEffect__ 接收主进程 IPC 消息：
     *   { x, y, effect, text }
     * effect: 'touch'（涟漪）| 'gesture'（文字气泡+光环）
     */
    const ANIM_DURATION = {
      touch: 600,
      gesture: 1400
    }

    /**
     * 在指定坐标创建并播放射效
     * @param {{x:number, y:number, effect:string, text?:string}} data
     */
    function playEffect(data) {
      const { x, y, effect, text } = data || {}
      console.log('[overlay-diag] playEffect 收到:', JSON.stringify(data))
      if (typeof x !== 'number' || typeof y !== 'number') {
        console.log('[overlay-diag] 坐标无效，跳过')
        return
      }

      if (effect === 'touch') {
        // 涟漪 + 中心点
        const ripple = document.createElement('div')
        ripple.className = 'fx-ripple'
        ripple.style.left = x + 'px'
        ripple.style.top = y + 'px'
        document.body.appendChild(ripple)

        const dot = document.createElement('div')
        dot.className = 'fx-dot'
        dot.style.left = x + 'px'
        dot.style.top = y + 'px'
        document.body.appendChild(dot)

        const dur = ANIM_DURATION.touch
        setTimeout(() => { ripple.remove(); dot.remove() }, dur + 50)
      } else {
        // 手势：光环 + 文字气泡
        const ring = document.createElement('div')
        ring.className = 'fx-ring'
        ring.style.left = x + 'px'
        ring.style.top = y + 'px'
        document.body.appendChild(ring)

        const bubble = document.createElement('div')
        bubble.className = 'fx-bubble'
        bubble.textContent = text || ''
        // 气泡显示在鼠标上方一点（向上偏移 48px），避免遮挡
        bubble.style.left = x + 'px'
        bubble.style.top = (y - 48) + 'px'
        document.body.appendChild(bubble)

        const dur = ANIM_DURATION.gesture
        setTimeout(() => { ring.remove(); bubble.remove() }, dur + 50)
      }
    }

    // preload 注入的全局回调，接收主进程 IPC 消息
    // 安全约束：contextIsolation=true，通过 contextBridge 暴露受控接口
    if (typeof window.overlayEffect !== 'undefined' && typeof window.overlayEffect.onEffect === 'function') {
      window.overlayEffect.onEffect(playEffect)
      console.log('[overlay-diag] overlayEffect.onEffect 注册成功')
    } else {
      console.error('[overlay-diag] overlayEffect.onEffect 未找到，动效将不可用')
    }
  </script>
</body>

</html>
